mongo:
  host: ${MONGO_HOST}
  port: 27017
  username: ${MONGO_USER}
  password: ${MONGO_PASSWORD}
  database: ${MONGO_DATABASE}
  options:
    authSource: admin

minio:
  endpoint: ${MINIO_HOST}
  port: 9000
  useSSL: false
  accessKey: ${MINIO_USER}
  secretKey: ${MINIO_PASSWORD}
  bucket: ${MINIO_BUCKET}

content:
  repoRoot: /data/liminal-field-kb
