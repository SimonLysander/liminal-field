server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── 安全响应头（HTTPS 由阿里云 ALB 终结，此处补充应用层安全头）──
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # ALB 终结 HTTPS 后转发 HTTP 到此处，HSTS 由 ALB 或 CDN 层配置

    # gzip 压缩——JS/CSS 体积大，压缩后传输减少 60-70%
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # API requests → backend server（^~ 阻止 .jpg/.png 等正则 location 截获 API 请求）
    location ^~ /api/ {
        proxy_pass http://server:4398;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 200m;
        # 大文件上传：流式转发，不缓存到磁盘；超时 10 分钟覆盖批量导入场景
        proxy_request_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # SPA fallback — all non-file routes return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
