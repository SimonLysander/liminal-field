<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>liminal-field-web</title>
  </head>
  <body>
    <!-- 页面加载前立即设置背景色，避免全页面刷新时闪白 -->
    <script>
      try {
        var t = localStorage.getItem('liminal-theme') || 'daylight';
        document.documentElement.setAttribute('data-theme', t);
        document.body.style.backgroundColor = t === 'midnight' ? '#161617' : '#FFFFFF';
      } catch(e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
