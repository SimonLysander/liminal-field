<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lux Stirring</title>
    <!-- 阅读体 webfont:霞鹜文楷(ZeoSeven 自动子集,font-display:swap)。
         CSS 仅声明 @font-face,字形按需下载(只在阅读区渲染到时才下),不拖累首屏。 -->
    <link rel="preconnect" href="https://fontsapi.zeoseven.com" crossorigin />
    <link rel="preconnect" href="https://fontsapi-storage.zeoseven.com" crossorigin />
    <link rel="stylesheet" href="https://fontsapi.zeoseven.com/292/main/result.css" />
  </head>
  <body>
    <!-- 页面加载前立即设置背景色，避免全页面刷新时闪白 -->
    <script>
      try {
        var t = localStorage.getItem('liminal-theme') || 'daylight';
        document.documentElement.setAttribute('data-theme', t);
        document.body.style.backgroundColor = t === 'midnight' ? '#161617' : '#FFFFFF';
      } catch(e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
