services:
  mongo:
    image: docker.1ms.run/mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    # 不暴露到宿主机，仅通过 Docker 内部网络访问
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - kb-data:/data/liminal-field-kb
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      # db.yaml 统一用环境变量，Docker 场景覆盖 host 为容器名
      MONGO_HOST: mongo
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DATABASE: ${MONGO_DATABASE}
      OSS_INTERNAL: ${OSS_INTERNAL:-false}
      OSS_REGION: ${OSS_REGION:-oss-cn-beijing}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET}
      OSS_BUCKET: ${OSS_BUCKET:-lux-stirring}
      CONTENT_REPO_ROOT: /data/liminal-field-kb
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      MINERU_TOKEN: ${MINERU_TOKEN:-}
      KB_REMOTE_URL: ${KB_REMOTE_URL:-}
      KB_GIT_TOKEN: ${KB_GIT_TOKEN:-}
      GIT_SYNC_CRON: ${GIT_SYNC_CRON:-0 3 * * *}
      CONTENT_GIT_AUTHOR_NAME: ${CONTENT_GIT_AUTHOR_NAME:-Liminal Field}
      CONTENT_GIT_AUTHOR_EMAIL: ${CONTENT_GIT_AUTHOR_EMAIL:-no-reply@liminal-field.local}
    # 不暴露到宿主机，由 nginx (client) 统一代理

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  mongo-data:
  kb-data:
