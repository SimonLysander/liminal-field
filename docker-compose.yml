services:
  mongo:
    image: docker.1ms.run/mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    # 不暴露到宿主机，仅通过 Docker 内部网络访问
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    # 防止单容器吃光宿主机内存
    deploy:
      resources:
        limits:
          memory: 512M
    # 隔离在后端网络，client 无法直连 mongo
    networks:
      - backend

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - kb-data:/data/liminal-field-kb
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      # db.yaml 统一用环境变量，Docker 场景覆盖 host 为容器名
      MONGO_HOST: mongo
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DATABASE: ${MONGO_DATABASE}
      OSS_INTERNAL: ${OSS_INTERNAL:-false}
      OSS_REGION: ${OSS_REGION:-oss-cn-beijing}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET}
      OSS_BUCKET: ${OSS_BUCKET:-lux-stirring}
      CONTENT_REPO_ROOT: /data/liminal-field-kb
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      MINERU_TOKEN: ${MINERU_TOKEN:-}
      KB_REMOTE_URL: ${KB_REMOTE_URL:-}
      KB_GIT_TOKEN: ${KB_GIT_TOKEN:-}
      GIT_SYNC_CRON: ${GIT_SYNC_CRON:-0 3 * * *}
      CONTENT_GIT_AUTHOR_NAME: ${CONTENT_GIT_AUTHOR_NAME:-Liminal Field}
      CONTENT_GIT_AUTHOR_EMAIL: ${CONTENT_GIT_AUTHOR_EMAIL:-no-reply@liminal-field.local}
    # 不暴露到宿主机，由 nginx (client) 统一代理
    # 防止单容器吃光宿主机内存
    deploy:
      resources:
        limits:
          memory: 512M
    # 同时接入两个网络：与 client 通信 + 与 mongo 通信
    networks:
      - frontend
      - backend

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Let's Encrypt 证书 + ACME 验证目录
      - certbot-certs:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    # nginx 轻量，不加内存限制
    # 仅接入前端网络，无法直连 mongo
    networks:
      - frontend

  # 证书自动续期：每 12 小时检查一次，到期前 30 天自动续期
  certbot:
    image: docker.1ms.run/certbot/certbot
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    # 每 12 小时尝试续期，续期成功后 nginx 会在下次 reload 时加载新证书
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'
    depends_on:
      - client
    networks: []

volumes:
  mongo-data:
  kb-data:
  certbot-certs:
  certbot-webroot:

# frontend：client ↔ server 通信
# backend：server ↔ mongo 通信（client 与 mongo 完全隔离）
networks:
  frontend:
  backend:
