services:
  mongo:
    image: docker.1ms.run/mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    ports:
      - "27018:27017"

  minio:
    image: docker.1ms.run/minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "9002:9000"
      - "9003:9001"

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      - mongo
      - minio
    volumes:
      - ./server/configs/db.docker.yaml:/app/configs/db.yaml:ro
      - kb-data:/data/liminal-field-kb
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # server 通过 db.yaml 读取连接信息，这里传入供 db.docker.yaml 使用
      MONGO_HOST: mongo
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DATABASE: ${MONGO_DATABASE}
      MINIO_HOST: minio
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      KB_REMOTE_URL: ${KB_REMOTE_URL:-}
      MINERU_TOKEN: ${MINERU_TOKEN:-}
    ports:
      - "4398:4398"

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "4399:80"

volumes:
  mongo-data:
  minio-data:
  kb-data:
