services:
  mongo:
    image: docker.1ms.run/mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - backend

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - kb-data:/data/liminal-field-kb
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      MONGO_HOST: mongo
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DATABASE: ${MONGO_DATABASE}
      OSS_INTERNAL: ${OSS_INTERNAL:-false}
      OSS_REGION: ${OSS_REGION:-oss-cn-beijing}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET}
      OSS_BUCKET: ${OSS_BUCKET:-lux-stirring}
      CONTENT_REPO_ROOT: /data/liminal-field-kb
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
    dns:
      - 223.5.5.5
      - 8.8.8.8
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - frontend
      - backend

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    # 不直接暴露端口，由 Caddy 反代
    networks:
      - frontend

  # Caddy 负责 HTTPS 终结 + 自动证书，零配置
  caddy:
    image: docker.1ms.run/caddy:2
    restart: unless-stopped
    depends_on:
      - client
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-localhost}
    networks:
      - frontend

volumes:
  mongo-data:
  kb-data:
  caddy-data:
  caddy-config:

networks:
  frontend:
  backend:
