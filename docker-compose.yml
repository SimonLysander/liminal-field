services:
  mongo:
    image: docker.1ms.run/mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    ports:
      - "27018:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: docker.1ms.run/minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "9002:9000"
      - "9003:9001"

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - kb-data:/data/liminal-field-kb
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      # db.yaml 统一用环境变量，Docker 场景覆盖 host 为容器名
      MONGO_HOST: mongo
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DATABASE: ${MONGO_DATABASE}
      MINIO_HOST: minio
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      CONTENT_REPO_ROOT: /data/liminal-field-kb
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      MINERU_TOKEN: ${MINERU_TOKEN:-}
      KB_REMOTE_URL: ${KB_REMOTE_URL:-}
      GIT_SYNC_CRON: ${GIT_SYNC_CRON:-0 3 * * *}
      CONTENT_GIT_AUTHOR_NAME: ${CONTENT_GIT_AUTHOR_NAME:-Liminal Field}
      CONTENT_GIT_AUTHOR_EMAIL: ${CONTENT_GIT_AUTHOR_EMAIL:-no-reply@liminal-field.local}
    ports:
      - "4398:4398"

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "4399:80"

volumes:
  mongo-data:
  minio-data:
  kb-data:
