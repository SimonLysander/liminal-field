services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - backend

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      rsshub:
        condition: service_started
    volumes:
      - kb-data:/data/liminal-field-kb
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      MONGO_HOST: mongo
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DATABASE: ${MONGO_DATABASE}
      OSS_INTERNAL: ${OSS_INTERNAL:-false}
      OSS_REGION: ${OSS_REGION:-oss-cn-beijing}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET}
      OSS_BUCKET: ${OSS_BUCKET:-lux-stirring}
      CONTENT_REPO_ROOT: /data/liminal-field-kb
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      # RSSHub 内部地址；容器名即 DNS，port 1200 为 RSSHub 默认
      RSSHUB_BASE_URL: ${RSSHUB_BASE_URL:-http://rsshub:1200}
    dns:
      - 223.5.5.5
      - 8.8.8.8
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - frontend
      - backend

  # RSSHub：RSS 聚合代理，仅 backend 网络内可达，不对公网暴露（防滥用）。
  # 使用 chromium-bundled 镜像支持掘金等 SPA 站渲染；镜像体积 ~600MB，运行内存 ~200-400MB。
  # 阿里云 1.8G 机器：mem_limit 512m + chromium 共用进程池，需监控；若 OOM 可换 diygod/rsshub:latest。
  rsshub:
    image: diygod/rsshub:chromium-bundled
    restart: unless-stopped
    networks:
      - backend
    environment:
      NODE_ENV: production
      CACHE_TYPE: memory
      CACHE_EXPIRE: 3600
    # 不暴露宿主机端口；仅 backend 网络内 server 能访问
    mem_limit: 512m

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    # 不直接暴露端口，由 Caddy 反代
    networks:
      - frontend

  # Caddy 负责 HTTPS 终结 + 自动证书，零配置
  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - client
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-localhost}
    networks:
      - frontend

volumes:
  mongo-data:
  kb-data:
  caddy-data:
  caddy-config:

networks:
  frontend:
  backend:
